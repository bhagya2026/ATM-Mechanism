<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ATM Machine Simulation">
    <title>ATM Machine Simulator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="atm-container">

    <header>
        <h1>🏦 ATM Machine</h1>
    </header>

    <!-- ATM Display -->
    <section class="atm-screen" id="atm-display" aria-live="polite">

        <!-- Card Screen -->
        <div id="card-screen" class="screen-view">

            <p class="screen-title">
                Welcome!
                <br>
                Please insert your Debit Card to continue.
            </p>

            <button
                type="button"
                class="screen-btn action-btn insert-card-btn"
                onclick="insertCard()">

                💳 Insert Card

            </button>

        </div>

        <!-- Language Screen -->
        <div id="language-screen" class="screen-view hidden">

            <p class="screen-title">
                Select Your Language
                <br>
                ಭಾಷೆಯನ್ನು ಆಯ್ಕೆ ಮಾಡಿ
            </p>

            <div class="screen-buttons">

                <button
                    type="button"
                    class="screen-btn"
                    onclick="selectLanguage('en')">

                    🇬🇧 English

                </button>

                <button
                    type="button"
                    class="screen-btn"
                    onclick="selectLanguage('kn')">

                    🇮🇳 ಕನ್ನಡ

                </button>

            </div>

        </div>

        <!-- PIN Screen -->
        <div id="pin-screen" class="screen-view hidden">

            <label for="pin-input" id="pin-prompt" class="screen-title">
                Enter Your 4-Digit PIN
            </label>

            <input
                type="password"
                id="pin-input"
                maxlength="4"
                minlength="4"
                inputmode="numeric"
                placeholder="••••"
                autocomplete="off"
                required
                aria-label="Enter ATM PIN">

            <button
                type="button"
                id="pin-submit-btn"
                class="screen-btn action-btn"
                onclick="verifyPin()">

                ✅ Verify PIN

            </button>

        </div>

        <!-- Dashboard -->
        <div id="dashboard-screen" class="screen-view hidden">

            <h3>Welcome!</h3>

            <p id="status-text">
                Card authenticated successfully.
                <br>
                Please choose a transaction.
            </p>

        </div>

    </section>

    <!-- Amount Input -->
    <section class="input-container">

        <label for="amount" class="screen-title">
            Transaction Amount
        </label>

        <input
            type="number"
            id="amount"
            min="1"
            step="1"
            placeholder="Enter Amount"
            disabled
            autocomplete="off"
            aria-label="Enter transaction amount">

    </section>

    <!-- Buttons -->
    <section class="button-grid">

        <button
            type="button"
            id="btn-deposit"
            class="btn deposit"
            onclick="handleDeposit()"
            disabled>

            💰 Deposit

        </button>

        <button
            type="button"
            id="btn-withdraw"
            class="btn withdraw"
            onclick="handleWithdraw()"
            disabled>

            💵 Withdraw

        </button>

        <button
            type="button"
            id="btn-check"
            class="btn check"
            onclick="handleCheckBalance()"
            disabled>

            📊 Check Balance

        </button>

        <button
            type="button"
            id="btn-reset"
            class="btn reset"
            onclick="resetATM()">

            🚪 Eject Card

        </button>

    </section>

    <footer class="atm-footer">
        <small>
            ATM Simulator • Built using HTML, CSS & JavaScript
        </small>
    </footer>

</main>

<script src="script.js"></script>

</body>
</html>
